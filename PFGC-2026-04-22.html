  const { ticker, date, current_price, ohlcv, volume, ema20, ema50, rsi,

    document.getElementById('h-zone').textContent =
      `Level $${bestZone.price.toFixed(2)} | score ${bestZone.score}${flip}`;
  }

  if (tp2)  document.getElementById('h-tp2').textContent  = `TP2 $${tp2.toFixed(2)}`;
  if (stop) document.getElementById('h-stop').textContent = `Stop $${stop.toFixed(2)}`;
  if (stats) {

      `WR ${(stats.win_rate * 100).toFixed(0)}% (${stats.num_trades}T)`;
  }
  if (stats && stats.fundamental_score != null) {
    document.getElementById('h-fscore').textContent =
      `FA ${stats.fundamental_score}/100`;

    up: '#26a69a', dn: '#ef5350',
    ema20: '#f0b429', ema50: '#a78bfa',
    support: '#26a69a', resistance: '#ef5350', flipped: '#f0b429',
    tp: '#39d353', stop: '#ef5350', entry: '#58a6ff',
    rsi: '#58a6ff', rsiOb: '#ef5350', rsiOs: '#26a69a',
    volume: 'rgba(120,120,120,0.25)',
  };

  const LS = LightweightCharts.LineStyle;

  // ── Shared chart factory ──
  function makeChart(el, height, opts = {}) {
    return LightweightCharts.createChart(el, {
      layout:     { background: { color: C.bg }, textColor: C.text },
      grid:       { vertLines: { color: C.grid }, horzLines: { color: C.grid } },
      crosshair:  { mode: LightweightCharts.CrosshairMode.Normal },
