  }

  // ── Colours ──
  const C = {
    bg: '#0d0d0d', text: '#c9d1d9', grid: '#161b22',
    up: '#26a69a', dn: '#ef5350',
    ema20: '#f0b429', ema50: '#a78bfa',
    support: '#26a69a', resistance: '#ef5350', flipped: '#f0b429',
    tp: '#39d353', stop: '#ef5350', entry: '#58a6ff',
    rsi: '#58a6ff', rsiOb: '#ef5350', rsiOs: '#26a69a',
    volume: 'rgba(120,120,120,0.25)',
  };

  const LS = LightweightCharts.LineStyle;

  // ── Shared chart factory ──
  function makeChart(el, height, opts = {}) {
    return LightweightCharts.createChart(el, {
      layout:     { background: { color: C.bg }, textColor: C.text },
      grid:       { vertLines: { color: C.grid }, horzLines: { color: C.grid } },
      crosshair:  { mode: LightweightCharts.CrosshairMode.Normal },
      rightPriceScale: { borderColor: '#30363d' },
      timeScale:  { borderColor: '#30363d', timeVisible: true },
      handleScroll: true, handleScale: true,
      height,
      ...opts,
    });
  }

  // v5 series constructors live on the LightweightCharts namespace
  const { CandlestickSeries, LineSeries, HistogramSeries } = LightweightCharts;

  // ── Main chart ──
  const mainEl = document.getElementById('main-chart');
  const mainChart = makeChart(mainEl, mainEl.clientHeight || 500);

  // Candlesticks
  const candleSeries = mainChart.addSeries(CandlestickSeries, {
    upColor: C.up, downColor: C.dn,
    borderUpColor: C.up, borderDownColor: C.dn,
    wickUpColor: C.up, wickDownColor: C.dn,
  });
  candleSeries.setData(ohlcv);

  // Volume (overlaid, bottom 20% of main pane)
  const volSeries = mainChart.addSeries(HistogramSeries, {
    priceFormat: { type: 'volume' },
    priceScaleId: 'vol',
  });
  mainChart.priceScale('vol').applyOptions({
    scaleMargins: { top: 0.82, bottom: 0 },
    borderVisible: false,
  });
  volSeries.setData(volume);

  // EMA lines
  const ema20Series = mainChart.addSeries(LineSeries, {
    color: C.ema20, lineWidth: 1,
    priceLineVisible: false, lastValueVisible: false,
    crosshairMarkerVisible: false,
  });
  ema20Series.setData(ema20);

  const ema50Series = mainChart.addSeries(LineSeries, {
    color: C.ema50, lineWidth: 1,
    priceLineVisible: false, lastValueVisible: false,
    crosshairMarkerVisible: false,
  });
  ema50Series.setData(ema50);

  // ── S/R zone price lines ──
  zones.forEach(z => {
    const col = z.flipped ? C.flipped : (z.price < current_price ? C.support : C.resistance);
    const label = `${z.timeframe} · ${z.touch_count}× · score ${z.score}${z.flipped ? ' ↔' : ''}`;
    candleSeries.createPriceLine({
      price: z.price, color: col, lineWidth: 1,
      lineStyle: LS.Dashed, axisLabelVisible: true, title: label,
    });
  });

  // TP / Stop price lines
  if (tp1)  candleSeries.createPriceLine({ price: tp1,  color: C.tp,    lineWidth: 1, lineStyle: LS.Dashed,  axisLabelVisible: true, title: 'TP1' });
  if (tp2)  candleSeries.createPriceLine({ price: tp2,  color: C.tp,    lineWidth: 1, lineStyle: LS.Dotted,  axisLabelVisible: true, title: 'TP2' });
  if (stop) candleSeries.createPriceLine({ price: stop, color: C.stop,  lineWidth: 2, lineStyle: LS.Solid,   axisLabelVisible: true, title: 'Stop' });

  // Open trade entry line
  if (trade && trade.entry_price) {
    const pnlStr = trade.pnl_pct != null
      ? ` (${trade.pnl_pct >= 0 ? '+' : ''}${(trade.pnl_pct * 100).toFixed(1)}%)`
      : '';
    candleSeries.createPriceLine({
      price: trade.entry_price, color: C.entry, lineWidth: 1,
      lineStyle: LS.Dotted, axisLabelVisible: true,
      title: `Entry${pnlStr}`,
    });
  }

  // ── RSI chart ──
  const rsiEl  = document.getElementById('rsi-chart');
  const rsiChart = makeChart(rsiEl, 110, { timeScale: { visible: false } });

  const rsiSeries = rsiChart.addSeries(LineSeries, {
    color: C.rsi, lineWidth: 1,
    priceLineVisible: false, lastValueVisible: true,
  });
  rsiSeries.setData(rsi);

  // Overbought / oversold bands
  if (rsi.length) {
    const firstT = rsi[0].time;
    const lastT  = rsi[rsi.length - 1].time;
    [[70, C.rsiOb, 'OB'], [30, C.rsiOs, 'OS']].forEach(([level, col, title]) => {
      rsiSeries.createPriceLine({ price: level, color: col, lineWidth: 1, lineStyle: LS.Dashed, title });
    });
  }

  // RSI scale fixed 0–100
  rsiChart.priceScale('right').applyOptions({ autoScale: false, minimum: 0, maximum: 100 });

  // Default view: show the last 90 trading days; full history is scrollable
  mainChart.timeScale().setVisibleLogicalRange({ from: ohlcv.length - 90, to: ohlcv.length - 1 });

  // ── Sync time scales ──
  mainChart.timeScale().subscribeVisibleLogicalRangeChange(range => {
    if (range) rsiChart.timeScale().setVisibleLogicalRange(range);
  });
  rsiChart.timeScale().subscribeVisibleLogicalRangeChange(range => {
    if (range) mainChart.timeScale().setVisibleLogicalRange(range);
  });

  // ── Resize observer ──
  const ro = new ResizeObserver(() => {
    mainChart.applyOptions({ height: mainEl.clientHeight });
    rsiChart.applyOptions({ height: rsiEl.clientHeight });
  });
  ro.observe(mainEl);
  ro.observe(rsiEl);

  // ── Crosshair legend ──
  mainChart.subscribeCrosshairMove(param => {
    if (!param.time) return;
    const c = param.seriesData.get(candleSeries);
    if (c) {
      const pnl = trade && trade.entry_price
        ? ` | P&L ${((c.close - trade.entry_price) / trade.entry_price * 100).toFixed(2)}%`
        : '';
      document.getElementById('legend').innerHTML =
        `<span>O ${c.open.toFixed(2)}</span><span>H ${c.high.toFixed(2)}</span>` +
        `<span>L ${c.low.toFixed(2)}</span><span>C ${c.close.toFixed(2)}</span>${pnl}`;
    }
    const r = param.seriesData.get(rsiSeries);
    if (r) {
      document.getElementById('rsi-label').textContent = `RSI ${r.value.toFixed(1)}`;
    }
  });
})();
</script>
</body>
</html>
